<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReallyWorld</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <img src="logo.png" alt="ReallyWorld Logo" class="logo-img">
            <span class="logo-text">REALLY<br><span class="logo-text-bottom">WORLD</span></span>
        </div>

        <nav class="nav-menu">
            <a href="#" class="nav-item active">
                <i class="fa-solid fa-house icon-orange"></i>
                ГЛАВНАЯ
            </a>
            <a href="#" class="nav-item active">
                <i class="fa-solid fa-gift icon-orange"></i>
                БЕСПЛАТНЫЙ ДОНАТ
            </a>
        </nav>
    </header>

    <main class="hero-section">
        <h1 class="hero-title">ReallyWorld,<br>бесплатный донат тут!</h1>

        <div class="server-status-card">
            <div class="status-icon-box">
                <i class="fa-solid fa-star icon-star"></i>
            </div>
            <div class="status-text-box">
                <span class="status-title">НАШ СЕРВЕР</span>
                <span class="status-ip">MC.REALLYWORLD.RU</span>
            </div>
        </div>
    </main>

</body>
</html>
