<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReallyWorld — Магазин привилегий</title>
    <!-- Подключаем внешний файл стилей -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Главный контейнер для карточек товаров -->
    <div class="container">
        
        <!-- Карточка GOD -->
        <div class="card">
            <div class="card-img-wrapper">
                <img src="https://reallyworld.ru/images/god2.png" alt="GOD">
            </div>
            <h3>GOD</h3>
            <div class="price">4444 руб.</div>
            <a href="#" class="btn">Купить</a>
        </div>

        <!-- Карточка HELPER -->
        <div class="card">
            <div class="card-img-wrapper">
                <img src="https://reallyworld.ru/images/new/HELPER.png" alt="HELPER">
            </div>
            <h3>HELPER</h3>
            <div class="price">6666 руб.</div>
            <a href="#" class="btn">Купить</a>
        </div>

        <!-- Карточка DRAGON -->
        <div class="card">
            <div class="card-img-wrapper">
                <img src="https://reallyworld.ru/images/new/DRAGON.png" alt="DRAGON">
            </div>
            <h3>DRAGON</h3>
            <div class="price">1899 руб.</div>
            <a href="#" class="btn">Купить</a>
        </div>

        <!-- Карточка IMPERATOR -->
        <div class="card">
            <div class="card-img-wrapper">
                <img src="https://reallyworld.ru/images/new/IMPERATOR.png" alt="IMPERATOR">
            </div>
            <h3>IMPERATOR</h3>
            <div class="price">999 руб.</div>
            <a href="#" class="btn">Купить</a>
        </div>

        <!-- Карточка ЦАРЬ -->
        <div class="card">
            <div class="card-img-wrapper">
                <img src="https://reallyworld.ru/images/king.png.webp" alt="ЦАРЬ">
            </div>
            <h3>ЦАРЬ</h3>
            <div class="price">2299 руб.</div>
            <a href="#" class="btn">Купить</a>
        </div>

        <!-- Карточка TITAN -->
        <div class="card">
            <div class="card-img-wrapper">
                <img src="https://reallyworld.ru/images/titan.webp" alt="TITAN">
            </div>
            <h3>TITAN</h3>
            <div class="price">89.руб</div>
            <a href="#" class="btn">Купить</a>
        </div>

        <!-- Карточка Сундука с донат-вещами -->
        <div class="card">
            <div class="card-img-wrapper">
                <img src="https://reallyworld.ru/images/new/donatitem1.png" alt="Кейс с вещами">
            </div>
            <h3>3 Сундука вещей</h3>
            <div class="price">399 руб.</div>
            <a href="#" class="btn">Купить</a>
        </div>

        <!-- Карточка Сундука с Донатом -->
        <div class="card">
            <div class="card-img-wrapper">
                <img src="https://reallyworld.ru/images/new/casedonat3.png" alt="Кейс с донатом">
            </div>
            <h3>25 Сундуков</h3>
            <div class="price">399 руб.</div>
            <a href="#" class="btn">Купить</a>
        </div>

    </div>

</body>
</html>
